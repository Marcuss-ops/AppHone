name: skelphone
description: A professional Flutter template for content-driven and subscription apps.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Audio
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  just_audio_background: ^0.0.1-beta.13

  # Auth / Backend
  supabase_flutter: ^2.5.3
  http: ^1.2.2

  # Payments
  flutter_stripe: ^10.2.0
  url_launcher: ^6.3.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  flutter_animate: ^4.5.0

  # Storage
  shared_preferences: ^2.3.2

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.20.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  path_provider: ^2.1.5
  path: ^1.9.1
  table_calendar: ^3.2.0
  device_preview: ^1.2.0
  glossy: ^0.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
